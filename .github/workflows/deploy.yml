name: Deploy ke VPS

on:
  push:
    branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Decode SSH
        run: |
          echo "${{ secrets.PRIVATE_SSH_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Deploy ke VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: key.pem
          script: |
            cd /var/www/portofolio-website-react

            echo "Reset local changes.."
            git reset --hard

            echo "Pull the latest code..."
            git pull origin main


            echo "Stop dan delete old container.."
            docker stop portofolio || true
            docker rm portofolio || true

            echo "Build new Image.."
            docker build -t portofolio-react .

            echo "Running container.."
            docker run -d -p 3000:80 --name portofolio portofolio-react

            echo "Deploy selesai!"
